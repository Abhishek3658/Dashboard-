<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narang Scientific Industries — LinkVault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ══ THEME VARIABLES ══════════════════════════════ */
[data-theme="dark"] {
  --bg:       #0f0f13;
  --surface:  #17171e;
  --surface2: #1e1e28;
  --border:   #2a2a38;
  --text:     #e8e8f0;
  --muted:    #7a7a96;
  --shadow:   0 8px 32px rgba(0,0,0,0.42);
  --overlay-bg: rgba(0,0,0,0.65);
}
[data-theme="light"] {
  --bg:       #f0f0f8;
  --surface:  #ffffff;
  --surface2: #f5f5fc;
  --border:   #d8d8ec;
  --text:     #18182e;
  --muted:    #8888aa;
  --shadow:   0 8px 32px rgba(80,80,180,0.1);
  --overlay-bg: rgba(30,30,60,0.55);
}
:root {
  --accent:  #7c6af7;
  --accent2: #f76a8c;
  --accent3: #6af7c8;
  --danger:  #f76a6a;
  --success: #6af7a0;
  --radius:  14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  transition: background .25s, color .25s;
}

/* ══ SIDEBAR ══════════════════════════════════════ */
.sidebar {
  width: 240px; min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  transition: background .25s, border-color .25s;
}

.logo {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}

.logo-img {
  width: 44px; height: 44px;
  object-fit: contain; border-radius: 8px; flex-shrink: 0;
}

.logo-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 0.88rem; font-weight: 700; line-height: 1.25;
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-text p { font-size: 0.63rem; color: var(--muted); margin-top: 2px; }

.sidebar-section { padding: 14px 12px 5px; }
.sidebar-label {
  font-size: 0.63rem; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); padding: 0 8px; margin-bottom: 5px;
}

.sidebar-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 11px; border-radius: 9px; cursor: pointer;
  font-size: 0.85rem; color: var(--muted);
  transition: all .18s; margin-bottom: 2px;
  border: none; background: none; width: 100%; text-align: left;
}
.sidebar-item:hover  { background: var(--surface2); color: var(--text); }
.sidebar-item.active { background: rgba(124,106,247,.14); color: var(--accent); font-weight: 500; }
.sidebar-item .icon  { font-size: .9rem; width: 18px; text-align: center; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.sidebar-footer {
  margin-top: auto; padding: 13px;
  border-top: 1px solid var(--border);
}
.stats-mini {
  background: var(--surface2); border-radius: 10px;
  padding: 10px 13px; font-size: .76rem; color: var(--muted);
}
.stats-mini strong { color: var(--text); font-size: 1.05rem; display: block; }

/* ══ MAIN + TOPBAR ════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 22px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10; height: 66px;
  transition: background .25s, border-color .25s;
}

/* Brand block */
.topbar-brand {
  display: flex; align-items: center; gap: 10px;
  padding-right: 16px; border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.brand-logo {
  width: 42px; height: 42px;
  object-fit: contain; border-radius: 8px; flex-shrink: 0;
  border: 1px solid var(--border);
}
.brand-svg {
  width: 42px; height: 42px; flex-shrink: 0;
  border-radius: 8px; overflow: hidden;
}
.brand-name { font-family: 'Playfair Display',serif; font-size: .88rem; font-weight: 700; line-height: 1.25; }
.brand-sub  { font-size: .6rem; color: var(--muted); }

/* Clock */
.clock-wrap { display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; }
.clock-time {
  font-size: 1.08rem; font-weight: 600; color: var(--text);
  font-variant-numeric: tabular-nums; letter-spacing: .05em;
}
.clock-date { font-size: .65rem; color: var(--muted); }

/* Theme toggle */
.theme-btn {
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0; transition: all .18s;
}
.theme-btn:hover { border-color: var(--accent); }

/* Search */
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 9px 14px 9px 38px; color: var(--text);
  font-family: inherit; font-size: .86rem; outline: none;
  transition: border .2s, background .25s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap .si {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); color: var(--muted); font-size: .88rem;
}

/* ══ BUTTONS ══════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: 10px; border: none;
  cursor: pointer; font-family: inherit; font-size: .84rem;
  font-weight: 500; transition: all .18s; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg,var(--accent),#6a5af7);
  color: #fff; box-shadow: 0 4px 16px rgba(124,106,247,.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,106,247,.45); }
.btn-primary:disabled { opacity: .6; transform: none; cursor: wait; }
.btn-ghost {
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--accent); }
.btn-danger {
  background: rgba(247,106,106,.12); color: var(--danger);
  border: 1px solid rgba(247,106,106,.3);
}
.btn-danger:hover  { background: rgba(247,106,106,.22); }
.btn-danger:disabled { opacity:.6; cursor:wait; }

/* ══ CONTENT ══════════════════════════════════════ */
.content { padding: 24px; overflow-y: auto; flex: 1; }
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
}
.page-title   { font-family: 'Playfair Display',serif; font-size: 1.5rem; }
.page-subtitle{ color: var(--muted); font-size: .83rem; margin-top: 3px; }

.filter-row {
  display: flex; gap: 7px; margin-bottom: 18px;
  flex-wrap: wrap; align-items: center;
}
.filter-chip {
  padding: 5px 13px; border-radius: 20px;
  border: 1px solid var(--border); background: none;
  color: var(--muted); font-family: inherit; font-size: .78rem;
  cursor: pointer; transition: all .18s;
}
.filter-chip:hover, .filter-chip.active {
  background: rgba(124,106,247,.14); border-color: var(--accent); color: var(--accent);
}
.view-toggle {
  margin-left: auto; display: flex; gap: 3px;
  background: var(--surface2); border-radius: 8px; padding: 3px;
}
.vtbtn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; padding: 5px 9px; border-radius: 6px;
  font-size: .84rem; transition: all .15s;
}
.vtbtn.active { background: var(--surface); color: var(--text); }

/* ══ LOADING BAR ══════════════════════════════════ */
.loading-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
  background-size: 200%;
  z-index: 9999; transform: scaleX(0); transform-origin: left;
  transition: transform .4s; animation: none;
}
.loading-bar.show {
  transform: scaleX(1);
  animation: shimmer 1.2s linear infinite;
}
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

/* ══ CARDS ════════════════════════════════════════ */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(285px,1fr));
  gap: 15px;
}
.links-grid.list-view { grid-template-columns: 1fr; }

/* Entire card is clickable */
.link-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 17px 19px;
  transition: all .2s; position: relative; overflow: hidden;
  animation: fadeUp .3s ease both;
  cursor: pointer;              /* ← whole card opens URL */
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.link-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: var(--card-accent,var(--accent)); opacity:0; transition:opacity .2s;
}
.link-card:hover {
  border-color: rgba(124,106,247,.4);
  transform: translateY(-2px); box-shadow: var(--shadow);
}
.link-card:hover::before { opacity:1; }

.card-top { display:flex; align-items:flex-start; gap:11px; margin-bottom:11px; }
.favicon {
  width:36px; height:36px; border-radius:8px;
  background: var(--surface2);
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; flex-shrink:0; border:1px solid var(--border);
}
.card-meta  { flex:1; min-width:0; }
.card-name  { font-weight:600; font-size:.93rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-url   { font-size:.73rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.card-desc  { font-size:.81rem; color:var(--muted); line-height:1.5; margin-bottom:13px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card-footer{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.cat-badge  { font-size:.71rem; font-weight:500; padding:3px 9px; border-radius:20px; border:1px solid; }

/* Action buttons float on hover, stop card-click propagation */
.card-actions {
  display:flex; gap:4px; opacity:0; transition:opacity .18s;
  position:relative; z-index:2;
}
.link-card:hover .card-actions { opacity:1; }
.links-grid.list-view .card-actions { opacity:1; }

.icon-btn {
  width:29px; height:29px; border-radius:7px;
  border:1px solid var(--border); background:var(--surface2);
  color:var(--muted); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:.78rem; transition:all .15s;
}
.icon-btn:hover     { color:var(--text); border-color:var(--accent); }
.icon-btn.del:hover { color:var(--danger); border-color:var(--danger); background:rgba(247,106,106,.1); }

/* List view overrides */
.links-grid.list-view .link-card  { padding:11px 15px; }
.links-grid.list-view .card-top   { margin-bottom:0; align-items:center; }
.links-grid.list-view .card-desc  { display:none; }
.links-grid.list-view .card-footer{ display:none; }
.links-grid.list-view .favicon    { width:28px; height:28px; font-size:.88rem; }

/* ══ MODALS ═══════════════════════════════════════ */
.overlay {
  position:fixed; inset:0; background:var(--overlay-bg);
  backdrop-filter:blur(5px); z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding:20px; opacity:0; pointer-events:none; transition:opacity .2s;
}
.overlay.show { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:26px; width:100%; max-width:480px;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
  transform:translateY(18px) scale(.97); transition:transform .25s, background .25s;
}
.overlay.show .modal { transform:none; }
.modal h2 { font-family:'Playfair Display',serif; font-size:1.18rem; margin-bottom:18px; }
.form-group { margin-bottom:13px; }
.form-group label {
  display:block; font-size:.77rem; font-weight:500; color:var(--muted);
  margin-bottom:5px; letter-spacing:.03em; text-transform:uppercase;
}
.form-group input,
.form-group textarea,
.form-group select {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:9px 13px; color:var(--text);
  font-family:inherit; font-size:.87rem; outline:none;
  transition:border .2s, background .25s;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus { border-color:var(--accent); }
.form-group textarea { resize:vertical; min-height:68px; }
.form-group select option { background:var(--surface2); }
.modal-actions { display:flex; gap:9px; justify-content:flex-end; margin-top:18px; }

.cat-list { display:flex; flex-direction:column; gap:7px; margin-bottom:13px; }
.cat-item {
  display:flex; align-items:center; gap:9px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:9px 13px;
}
.cat-item .cat-name { flex:1; font-size:.87rem; }
.cat-item input[type="color"] { width:26px; height:26px; border:none; border-radius:6px; cursor:pointer; background:none; padding:0; }

/* Empty state */
.empty-state { text-align:center; padding:52px 20px; color:var(--muted); }
.empty-state .ei { font-size:2.6rem; margin-bottom:11px; }
.empty-state h3  { font-size:.97rem; margin-bottom:5px; color:var(--text); }
.empty-state p   { font-size:.82rem; }

/* Confirm modal */
.confirm-modal { max-width:360px; text-align:center; }
.confirm-modal p { color:var(--muted); font-size:.86rem; margin:9px 0 18px; }

/* ══ TOAST ════════════════════════════════════════ */
.toast-wrap { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:7px; }
.toast {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:10px 15px; font-size:.82rem;
  box-shadow:var(--shadow); animation:slideIn .25s ease;
  display:flex; align-items:center; gap:9px; min-width:210px;
}
@keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:none;opacity:1} }
.toast.success { border-left:3px solid var(--success); }
.toast.danger  { border-left:3px solid var(--danger);  }
.toast.info    { border-left:3px solid var(--accent);  }


/* ══ CATEGORY EDIT INLINE ══════════════════════════ */
.cat-item input.cat-name-edit {
  flex:1; background:var(--surface); border:1px solid var(--accent);
  border-radius:7px; padding:5px 9px; color:var(--text);
  font-family:inherit; font-size:.87rem; outline:none;
}
.cat-item .icon-btn.edit-cat { color:var(--accent); }

/* ══ MOVE CATEGORY SELECT on card ══════════════════ */
.move-cat-wrap {
  position:relative; display:inline-block;
}
.move-cat-wrap select {
  appearance:none; -webkit-appearance:none;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:7px; padding:3px 22px 3px 8px;
  color:var(--muted); font-family:inherit; font-size:.71rem;
  cursor:pointer; outline:none; transition:border .18s, color .18s;
  max-width:110px;
}
.move-cat-wrap select:hover { border-color:var(--accent); color:var(--text); }
.move-cat-wrap::after {
  content:'▾'; position:absolute; right:6px; top:50%;
  transform:translateY(-50%); font-size:.65rem; color:var(--muted);
  pointer-events:none;
}

/* ══ AUTO SYNC STATUS BADGE ════════════════════════ */
.sync-status {
  display:flex; align-items:center; gap:5px;
  font-size:.65rem; color:var(--muted);
  padding:3px 8px; border-radius:20px;
  background:var(--surface2); border:1px solid var(--border);
  white-space:nowrap; flex-shrink:0;
}
.sync-dot {
  width:6px; height:6px; border-radius:50%; background:var(--muted);
  transition:background .3s;
}
.sync-dot.syncing { background:#f7c46a; animation:pulse 1s infinite; }
.sync-dot.ok      { background:var(--success); }
.sync-dot.err     { background:var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

@media(max-width:640px){
  .sidebar { display:none; }
  .content { padding:14px; }
  .topbar  { padding:0 12px; }
  .topbar-brand { display:none; }
}
</style>
</head>

<!-- ══ SCRIPT ════════════════════════════════════════════ -->
<script>
// ══════════════════════════════════════════════════════════
//  CONFIG  ← paste your Google Apps Script URL here
// ══════════════════════════════════════════════════════════
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzxvmU5k32kyFfdbIR-qwavuwi5-yp4JGgkFafpr2yFqq3GSbwvSFfko-uC3Ol1PqhIdQ/exec";
const USE_SHEETS  = BACKEND_URL.startsWith("https://script.google.com");

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let state = {
  links:[], categories:[],
  editId:null, deleteId:null,
  currentFilter:'all', view:'grid', mode:'all'
};

const DEF_CATS = [
  {id:'c1',name:'Work',         color:'#7c6af7'},
  {id:'c2',name:'Social',       color:'#f76a8c'},
  {id:'c3',name:'Tools',        color:'#6af7c8'},
  {id:'c4',name:'Learning',     color:'#f7c46a'},
  {id:'c5',name:'Entertainment',color:'#6ab8f7'},
];
const DEF_LINKS = [
  {id:'l1',name:'GitHub',   url:'https://github.com',            desc:'Code repository platform',   cat:'c1',icon:'🐙',fav:true, added:Date.now()-86400000*3},
  {id:'l2',name:'Figma',    url:'https://figma.com',             desc:'Design & prototyping tool',  cat:'c1',icon:'🎨',fav:false,added:Date.now()-86400000*2},
  {id:'l3',name:'YouTube',  url:'https://youtube.com',           desc:'Video streaming platform',   cat:'c5',icon:'▶️',fav:false,added:Date.now()-3600000*5},
  {id:'l4',name:'MDN Docs', url:'https://developer.mozilla.org', desc:'Web developer documentation',cat:'c4',icon:'📚',fav:true, added:Date.now()-3600000*1},
];

// ══════════════════════════════════════════════════════════
//  ③ REAL-TIME CLOCK
// ══════════════════════════════════════════════════════════
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function startClock() {
  function tick() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    
    document.getElementById("clockTime").textContent = h + ":" + m;
    document.getElementById('clockDate').textContent =
      `${DAYS[n.getDay()].slice(0,3)}, ${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  }
  tick();
  setInterval(tick, 1000);
}

// ══════════════════════════════════════════════════════════
//  ④ DARK / LIGHT THEME
// ══════════════════════════════════════════════════════════
function loadTheme() {
  const t = localStorage.getItem('lv_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next   = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('lv_theme', next);
}

// ══════════════════════════════════════════════════════════
//  LOADING BAR
// ══════════════════════════════════════════════════════════
function showLoading() { document.getElementById('loadingBar').classList.add('show'); }
function hideLoading() { document.getElementById('loadingBar').classList.remove('show'); }

// ══════════════════════════════════════════════════════════
//  ② GOOGLE SHEETS API
// ══════════════════════════════════════════════════════════
async function sheetGet(action) {
  const r = await fetch(`${BACKEND_URL}?action=${action}`);
  return r.json();
}
async function sheetPost(action, payload) {
  const r = await fetch(BACKEND_URL, {
    method:'POST',
    body: JSON.stringify({action, payload})
  });
  return r.json();
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
async function init() {
  loadTheme();
  startClock();

  const saved = localStorage.getItem('linkvault');
  if (saved) {
    const d = JSON.parse(saved);
    state.links      = d.links      || [];
    state.categories = d.categories || [];
    state.view       = d.view       || 'grid';
  } else {
    state.categories = DEF_CATS;
    state.links      = DEF_LINKS;
    saveLocal();
  }
  render();

  if (USE_SHEETS) {
    setSyncStatus('syncing');
    try {
      const data = await sheetGet('getAllData');
      if (data.success) {
        const sheetHasLinks = Array.isArray(data.links) && data.links.length > 0;
        const sheetHasCats  = Array.isArray(data.categories) && data.categories.length > 0;

        if (sheetHasLinks)  state.links      = data.links;
        if (sheetHasCats)   state.categories = data.categories;

        // If sheet is completely empty, push local data up to Sheet
        if (!sheetHasLinks && !sheetHasCats) {
          await sheetPost('importAll', {links: state.links, categories: state.categories});
        }

        saveLocal(); render();
        setSyncStatus('ok');
      } else {
        setSyncStatus('err');
      }
    } catch(e) {
      setSyncStatus('err');
    } finally {
      hideLoading();
    }
    startAutoSync();
  } else {
    setSyncStatus('');
  }
}

// ② Sync all data from Google Sheet
async function syncFromSheet(silent=false) {
  if (!USE_SHEETS) { toast('Configure BACKEND_URL first', 'info'); return; }
  showLoading();
  try {
    const data = await sheetGet('getAllData');
    if (data.success) {
      // Only overwrite local data if Sheet has actual rows
      // This prevents an empty/new Sheet from wiping locally-added data
      if (Array.isArray(data.links) && data.links.length > 0)
        state.links = data.links;
      if (Array.isArray(data.categories) && data.categories.length > 0)
        state.categories = data.categories;
      saveLocal(); render();
      if (!silent) toast('Synced from Google Sheets ✓', 'success');
    } else {
      if (!silent) toast('Sync failed: ' + (data.error||'?'), 'danger');
    }
  } catch(e) {
    if (!silent) toast('Cannot reach Google Sheets', 'danger');
  } finally {
    hideLoading();
  }
}

function saveLocal() {
  state._lastWrite = Date.now();
  localStorage.setItem('linkvault', JSON.stringify({
    links:state.links, categories:state.categories, view:state.view
  }));
}

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function render() {
  renderSidebar(); renderFilters(); renderLinks();
  document.getElementById('totalCount').textContent = state.links.length;
}

function renderSidebar() {
  document.getElementById('sidebarCats').innerHTML = state.categories.map(c => `
    <button class="sidebar-item ${state.currentFilter===c.id?'active':''}" onclick="filterCat('${c.id}')">
      <span class="cat-dot" style="background:${c.color}"></span>
      ${esc(c.name)}
      <span style="margin-left:auto;font-size:.73rem;color:var(--muted)">${state.links.filter(l=>l.cat===c.id).length}</span>
    </button>`).join('');
}

function renderFilters() {
  document.getElementById('filterRow').innerHTML = `
    <button class="filter-chip ${state.currentFilter==='all'?'active':''}" onclick="filterAll()">All (${state.links.length})</button>
    ${state.categories.map(c=>`
      <button class="filter-chip ${state.currentFilter===c.id?'active':''}" onclick="filterCat('${c.id}')"
        style="${state.currentFilter===c.id?`background:${c.color}20;border-color:${c.color};color:${c.color}`:''}">
        ${esc(c.name)} (${state.links.filter(l=>l.cat===c.id).length})</button>`).join('')}
    <div class="view-toggle">
      <button class="vtbtn ${state.view==='grid'?'active':''}" onclick="setView('grid')">⊞</button>
      <button class="vtbtn ${state.view==='list'?'active':''}" onclick="setView('list')">☰</button>
    </div>`;
}

function renderLinks() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let links = [...state.links];
  if (state.mode==='fav')    links = links.filter(l=>l.fav);
  else if (state.mode==='recent') links = links.sort((a,b)=>b.added-a.added).slice(0,10);
  if (state.currentFilter!=='all') links = links.filter(l=>l.cat===state.currentFilter);
  if (q) links = links.filter(l=>
    l.name.toLowerCase().includes(q)||l.url.toLowerCase().includes(q)||(l.desc||'').toLowerCase().includes(q));

  const grid = document.getElementById('linksGrid');
  if (!links.length) {
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="ei">🔗</div><h3>No links found</h3><p>Try a different search or add a new link.</p></div>`;
    grid.className='links-grid'; return;
  }
  grid.className = 'links-grid'+(state.view==='list'?' list-view':'');
  grid.innerHTML = links.map((l,i)=>{
    const cat      = state.categories.find(c=>c.id===l.cat);
    const cc       = cat?cat.color:'#7c6af7';
    const cn       = cat?cat.name:'Uncategorized';
    const su       = l.url.replace(/'/g,"\\'");
    const si       = l.id.replace(/'/g,"\\'");
    return `
      <div class="link-card" style="--card-accent:${cc};animation-delay:${i*.04}s"
           onclick="cardClick(event,'${su}')">
        <div class="card-top">
          <div class="favicon">${l.icon||'🔗'}</div>
          <div class="card-meta">
            <div class="card-name">${esc(l.name)} ${l.fav?'⭐':''}</div>
            <div class="card-url">${esc(l.url)}</div>
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="icon-btn" onclick="openLink('${su}')" title="Open">↗</button>
            <button class="icon-btn" onclick="openEdit('${si}')" title="Edit">✏️</button>
            <button class="icon-btn del" onclick="openDelete('${si}')" title="Delete">🗑</button>
          </div>
        </div>
        ${l.desc?`<div class="card-desc">${esc(l.desc)}</div>`:''}
        <div class="card-footer">
          <div class="move-cat-wrap" onclick="event.stopPropagation()" title="Move to category">
            <select onchange="moveToCategory('${si}',this.value)" onclick="event.stopPropagation()">
              ${state.categories.map(c=>`<option value="${c.id}" ${c.id===l.cat?'selected':''}>${esc(c.name)}</option>`).join('')}
            </select>
          </div>
          <span style="font-size:.71rem;color:var(--muted)">${timeAgo(l.added)}</span>
        </div>
      </div>`;
  }).join('');
}

// ① Clicking anywhere on the card opens the URL
function cardClick(e, url) { window.open(url, '_blank'); }

// ══════════════════════════════════════════════════════════
//  FILTERS / VIEW
// ══════════════════════════════════════════════════════════
function filterAll() {
  state.currentFilter='all'; state.mode='all';
  document.getElementById('pageTitle').textContent='All Links';
  document.getElementById('pageSubtitle').textContent='Manage and organize your links';
  setNav(0); render();
}
function filterCat(id) {
  state.currentFilter=id; state.mode='all';
  const c=state.categories.find(x=>x.id===id);
  document.getElementById('pageTitle').textContent=c?c.name:'Links';
  document.getElementById('pageSubtitle').textContent=`Browsing ${c?.name||''} links`;
  render();
}
function openFavourites() {
  state.mode='fav'; state.currentFilter='all';
  document.getElementById('pageTitle').textContent='Favourites';
  document.getElementById('pageSubtitle').textContent='Your starred links';
  setNav(1); render();
}
function openRecent() {
  state.mode='recent'; state.currentFilter='all';
  document.getElementById('pageTitle').textContent='Recent';
  document.getElementById('pageSubtitle').textContent='Last 10 added links';
  setNav(2); render();
}
function setNav(i) {
  document.querySelectorAll('.sidebar>.sidebar-section:first-of-type .sidebar-item')
    .forEach((el,j)=>el.classList.toggle('active',j===i));
}
function setView(v) { state.view=v; saveLocal(); render(); }

// ══════════════════════════════════════════════════════════
//  ADD / EDIT  (② syncs to Sheet)
// ══════════════════════════════════════════════════════════
function openAdd() {
  state.editId=null;
  document.getElementById('modalTitle').textContent='Add New Link';
  ['f_name','f_url','f_desc','f_icon'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_fav').checked=false;
  fillCatSelect('');
  document.getElementById('saveLinkBtn').textContent='Save Link';
  showModal('linkModal');
}
function openEdit(id) {
  const l=state.links.find(x=>x.id===id); if(!l) return;
  state.editId=id;
  document.getElementById('modalTitle').textContent='Edit Link';
  document.getElementById('f_name').value=l.name;
  document.getElementById('f_url').value=l.url;
  document.getElementById('f_desc').value=l.desc||'';
  document.getElementById('f_icon').value=l.icon||'';
  document.getElementById('f_fav').checked=!!l.fav;
  fillCatSelect(l.cat);
  document.getElementById('saveLinkBtn').textContent='Update Link';
  showModal('linkModal');
}
function fillCatSelect(sel) {
  document.getElementById('f_cat').innerHTML=state.categories.map(c=>
    `<option value="${c.id}" ${c.id===sel?'selected':''}>${esc(c.name)}</option>`).join('');
}

async function saveLink() {
  const name=document.getElementById('f_name').value.trim();
  const url =document.getElementById('f_url').value.trim();
  if(!name||!url){toast('Name and URL are required','danger');return;}

  const payload={
    name, url,
    desc:document.getElementById('f_desc').value.trim(),
    cat :document.getElementById('f_cat').value,
    icon:document.getElementById('f_icon').value.trim()||'🔗',
    fav :document.getElementById('f_fav').checked,
    added:Date.now()
  };

  const btn=document.getElementById('saveLinkBtn');
  btn.textContent='Saving…'; btn.disabled=true;

  if (state.editId) {
    payload.id=state.editId;
    const idx=state.links.findIndex(l=>l.id===state.editId);
    state.links[idx]={...state.links[idx],...payload};
    saveLocal(); render();
    if (USE_SHEETS) {
      try { await sheetPost('updateLink',payload); toast('Updated & synced to Sheet ✓','success'); }
      catch(e){ toast('Saved locally (sheet unavailable)','info'); }
    } else { toast('Link updated ✓','success'); }
  } else {
    const newId='l_'+Date.now();
    payload.id=newId;
    state.links.unshift(payload);
    saveLocal(); render();
    if (USE_SHEETS) {
      try {
        const res=await sheetPost('addLink',payload);
        if(res.success&&res.id){
          const idx=state.links.findIndex(l=>l.id===newId);
          if(idx>=0) state.links[idx].id=res.id;
          saveLocal();
        }
        toast('Added & saved to Sheet ✓','success');
      } catch(e){ toast('Added locally (sheet unavailable)','info'); }
    } else { toast('Link added ✓','success'); }
  }

  btn.textContent='Save Link'; btn.disabled=false;
  closeModal('linkModal');
}

// ② DELETE — removes from sheet too
function openDelete(id) {
  state.deleteId=id;
  const l=state.links.find(x=>x.id===id);
  document.getElementById('confirmText').textContent=`Delete "${l?.name}"? This cannot be undone.`;
  showModal('confirmModal');
}

async function confirmDelete() {
  const id=state.deleteId;
  const btn=document.getElementById('confirmDeleteBtn');
  btn.textContent='Deleting…'; btn.disabled=true;

  state.links=state.links.filter(l=>l.id!==id);
  saveLocal(); render(); closeModal('confirmModal');
  toast('Link deleted','danger');

  if (USE_SHEETS) {
    try { await sheetPost('deleteLink',{id}); }
    catch(e){ /* silently fails — already deleted locally */ }
  }
  btn.textContent='Delete'; btn.disabled=false;
}

// ══════════════════════════════════════════════════════════
//  CATEGORIES
// ══════════════════════════════════════════════════════════
function openCatManager() { renderCatList(); showModal('catModal'); }
function renderCatList() {
  document.getElementById('catList').innerHTML=state.categories.map(c=>`
    <div class="cat-item" id="catrow_${c.id}">
      <input type="color" value="${c.color}" onchange="updateCatColor('${c.id}',this.value)" title="Change color">
      <span class="cat-name" id="catname_${c.id}">${esc(c.name)}</span>
      <span style="font-size:.73rem;color:var(--muted)">${state.links.filter(l=>l.cat===c.id).length} links</span>
      <button class="icon-btn edit-cat" onclick="startEditCat('${c.id}')" title="Rename">✏️</button>
      <button class="icon-btn del" onclick="deleteCat('${c.id}')" title="Delete">🗑</button>
    </div>`).join('');
}
async function addCategory() {
  const name=document.getElementById('newCatName').value.trim();
  const color=document.getElementById('newCatColor').value;
  if(!name) return;
  const tempId = 'c_'+Date.now();
  state.categories.push({id:tempId, name, color});
  document.getElementById('newCatName').value='';
  saveLocal(); renderCatList(); render();
  if (USE_SHEETS) {
    try {
      const res = await sheetPost('addCategory', {name, color});
      if (res.success && res.id) {
        // Replace temp ID with sheet-assigned ID everywhere
        const cat = state.categories.find(c=>c.id===tempId);
        if (cat) cat.id = res.id;
        state.links.forEach(l=>{ if(l.cat===tempId) l.cat=res.id; });
        saveLocal(); renderCatList(); render();
      }
      toast('Category saved to Sheet ✓','success');
    } catch(e){ toast('Category saved locally (sheet unavailable)','info'); }
  } else { toast('Category added ✓','success'); }
}
async function updateCatColor(id,color) {
  const c=state.categories.find(x=>x.id===id);
  if(!c) return;
  c.color=color;
  saveLocal(); render();
  if (USE_SHEETS) {
    try { await sheetPost('updateCategory',{id, name:c.name, color}); }
    catch(e){}
  }
}
async function deleteCat(id) {
  if(state.links.some(l=>l.cat===id)){toast('Move links from this category first','danger');return;}
  state.categories=state.categories.filter(c=>c.id!==id);
  saveLocal(); renderCatList(); render();
  toast('Category deleted','danger');
  if (USE_SHEETS) {
    try { await sheetPost('deleteCategory',{id}); }
    catch(e){ /* already deleted locally */ }
  }
}

function openLink(url) { window.open(url,'_blank'); }
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) closeModal(el.id); });
});

function toast(msg,type='success') {
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${type==='success'?'✓':type==='danger'?'✕':'ℹ'}</span> ${msg}`;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

function esc(s){
  return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)    return 'just now';
  if(d<3600000)  return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}


// ══════════════════════════════════════════════════════════
//  ① EDIT CATEGORY NAME
// ══════════════════════════════════════════════════════════
function startEditCat(id) {
  const c = state.categories.find(x=>x.id===id);
  if (!c) return;
  const row = document.getElementById('catrow_'+id);
  const span = document.getElementById('catname_'+id);
  // Replace span with input
  const input = document.createElement('input');
  input.className = 'cat-name-edit';
  input.value = c.name;
  input.style.flex = '1';
  span.replaceWith(input);
  input.focus(); input.select();

  const save = async () => {
    const newName = input.value.trim();
    if (!newName) { renderCatList(); return; }
    c.name = newName;
    saveLocal(); render();
    renderCatList();
    if (USE_SHEETS) {
      try { await sheetPost('updateCategory', {id: c.id, name: newName, color: c.color}); }
      catch(e) {}
    }
    toast('Category renamed ✓','success');
  };

  input.addEventListener('keydown', e => {
    if (e.key==='Enter')  { e.preventDefault(); save(); }
    if (e.key==='Escape') { renderCatList(); }
  });
  input.addEventListener('blur', save);
}

// ══════════════════════════════════════════════════════════
//  ② MOVE LINK TO CATEGORY
// ══════════════════════════════════════════════════════════
async function moveToCategory(linkId, newCatId) {
  const link = state.links.find(l=>l.id===linkId);
  if (!link || link.cat===newCatId) return;
  const oldCat = link.cat;
  link.cat = newCatId;
  saveLocal(); render();
  const cat = state.categories.find(c=>c.id===newCatId);
  toast(`Moved to "${cat?.name||'category'}" ✓`, 'success');
  if (USE_SHEETS) {
    try { await sheetPost('updateLink', {...link}); }
    catch(e) { /* local already updated */ }
  }
}

// ══════════════════════════════════════════════════════════
//  ③ AUTO-SYNC — polls Google Sheet every 30 seconds
// ══════════════════════════════════════════════════════════
let autoSyncInterval = null;
let lastSyncTime = null;

function setSyncStatus(state_) {
  const dot   = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if (!dot) return;
  dot.className   = 'sync-dot ' + state_;
  if (state_==='syncing') label.textContent = 'Syncing…';
  else if (state_==='ok') {
    const t = new Date();
    label.textContent = `Synced ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
  }
  else if (state_==='err') label.textContent = 'Offline';
  else label.textContent = 'Ready';
}

async function autoSync() {
  if (!USE_SHEETS) { setSyncStatus(''); return; }
  // Don't overwrite local changes made within the last 5 seconds
  if (state._lastWrite && (Date.now() - state._lastWrite) < 5000) {
    setSyncStatus('ok'); return;
  }
  setSyncStatus('syncing');
  try {
    const data = await sheetGet('getAllData');
    if (data.success) {
      const linksChanged = JSON.stringify(data.links) !== JSON.stringify(state.links);
      const catsChanged  = JSON.stringify(data.categories) !== JSON.stringify(state.categories);
      if (linksChanged || catsChanged) {
        if (data.links)      state.links      = data.links;
        if (data.categories) state.categories = data.categories;
        saveLocal(); render();
      }
      setSyncStatus('ok');
    } else {
      setSyncStatus('err');
    }
  } catch(e) {
    setSyncStatus('err');
  }
}

function startAutoSync() {
  if (!USE_SHEETS) { setSyncStatus(''); return; }
  autoSync(); // immediate first sync
  autoSyncInterval = setInterval(autoSync, 30000); // every 30s
  setSyncStatus('syncing');
}
